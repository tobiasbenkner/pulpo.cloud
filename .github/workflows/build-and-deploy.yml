name: Build and Deploy

on:
    push:
        branches: [main]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  lfs: true

            - name: Install PNPM
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Get last successful commit
              id: last_success
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              # Findet den Commit-Hash des letzten erfolgreichen Laufs DIESES Workflows
              run: |
                  LAST_SHA=$(gh run list --workflow "Build and Deploy" --branch main --status success --limit 1 --json headSha -q '.[0].headSha')

                  if [ -z "$LAST_SHA" ]; then
                      echo "Kein erfolgreicher Run gefunden. Vergleiche mit dem vorherigen Commit."
                      LAST_SHA=${{ github.event.before }}
                  fi

                  # Prüfen ob der Commit im Repo erreichbar ist (kann nach rebase/force-push fehlen)
                  if ! git cat-file -e "$LAST_SHA" 2>/dev/null; then
                      echo "Commit $LAST_SHA nicht erreichbar — baue alles."
                      LAST_SHA=""
                  fi

                  echo "Vergleiche Änderungen seit: ${LAST_SHA:-HEAD~1}"
                  echo "commit=$LAST_SHA" >> "$GITHUB_OUTPUT"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Test
              run: pnpm test

            - name: Build
              env:
                  DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
                  DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
                  LAST_SHA: ${{ steps.last_success.outputs.commit }}
              run: |
                  if [ -n "$LAST_SHA" ]; then
                      npx turbo run build --filter=...[$LAST_SHA]
                  else
                      npx turbo run build
                  fi

            - name: Dockerize
              env:
                  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
                  LAST_SHA: ${{ steps.last_success.outputs.commit }}
              run: |
                  echo "${DOCKER_HUB_TOKEN}" | docker login -u pulpocloud --password-stdin
                  if [ -n "$LAST_SHA" ]; then
                      npx turbo run dockerize --filter=...[$LAST_SHA]
                  else
                      npx turbo run dockerize
                  fi

            - name: Deploy
              run: |
                curl -X GET -H "Authorization: Bearer $DEPLOY_TOKEN" https://deploy.pulpo.cloud/v1/update
              env:
                  DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
