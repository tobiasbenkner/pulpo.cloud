name: Deploy App

on:
  push:
    branches:
      - main
    paths:
      - "apps/pulpo-app/**"
      - "apps/shop/**"
      - "apps/agenda/**"
      - "apps/launcher/**"
      - "apps/menu/**"
      - "apps/admin/**"
      - "packages/invoice/**"

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate version
        id: version
        run: echo "version=$(date -u +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontends
        run: |
          (cd apps/launcher && npx astro build)
          (cd apps/menu && npx astro build)
          (cd apps/shop && npx astro build --base /shop)
          (cd apps/agenda && npx astro build --base /agenda)
          (cd apps/admin && npx astro build)

      - name: Copy frontends to pb_public
        run: |
          rm -rf apps/pulpo-app/pb_public/launcher/* apps/pulpo-app/pb_public/menu/* apps/pulpo-app/pb_public/shop/* apps/pulpo-app/pb_public/agenda/* apps/pulpo-app/pb_public/admin/*
          cp -r apps/launcher/dist/* apps/pulpo-app/pb_public/launcher/
          cp -r apps/menu/dist/* apps/pulpo-app/pb_public/menu/
          cp -r apps/shop/dist/* apps/pulpo-app/pb_public/shop/
          cp -r apps/agenda/dist/* apps/pulpo-app/pb_public/agenda/
          cp -r apps/admin/dist/* apps/pulpo-app/pb_public/admin/

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: pulpocloud
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/pulpo-app
          file: apps/pulpo-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            pulpocloud/app:latest
            pulpocloud/app:${{ steps.version.outputs.version }}

      - name: Deploy
        run: |
          curl -X GET -H "Authorization: Bearer $DEPLOY_TOKEN" https://deploy.pulpo.cloud/v1/update
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
