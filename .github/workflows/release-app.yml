name: Release App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-app
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontends
        run: |
          (cd apps/launcher && npx astro build)
          (cd apps/menu && npx astro build)
          (cd apps/shop && npx astro build --base /shop)
          (cd apps/agenda && npx astro build --base /agenda)
          (cd apps/admin && npx astro build)

      - name: Copy frontends to pb_public
        run: |
          rm -rf apps/pulpo-app/pb_public/launcher/* apps/pulpo-app/pb_public/menu/* apps/pulpo-app/pb_public/shop/* apps/pulpo-app/pb_public/agenda/* apps/pulpo-app/pb_public/admin/*
          cp -r apps/launcher/dist/* apps/pulpo-app/pb_public/launcher/
          cp -r apps/menu/dist/* apps/pulpo-app/pb_public/menu/
          cp -r apps/shop/dist/* apps/pulpo-app/pb_public/shop/
          cp -r apps/agenda/dist/* apps/pulpo-app/pb_public/agenda/
          cp -r apps/admin/dist/* apps/pulpo-app/pb_public/admin/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/pulpo-app/go.mod
          cache-dependency-path: apps/pulpo-app/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: apps/pulpo-app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
