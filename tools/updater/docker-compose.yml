services:
  watchtower:
    image: nickfedor/watchtower
    container_name: pulpo-watchtower
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${DEPLOY_TOKEN}
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.http.routers.watchtower.rule=Host(`deploy.pulpo.cloud`)
      - traefik.http.routers.watchtower.entrypoints=websecure
      - traefik.http.routers.watchtower.tls.certresolver=letsencrypt
      - traefik.http.services.watchtower.loadbalancer.server.port=8080
    restart: unless-stopped
